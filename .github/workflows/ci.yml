name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  install:
    name: Install
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - uses: actions/cache/save@v4
        with:
          path: node_modules
          key: nm-${{ hashFiles('package-lock.json') }}

  lint:
    name: Lint
    needs: install
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - uses: actions/cache/restore@v4
        with:
          path: node_modules
          key: nm-${{ hashFiles('package-lock.json') }}
      - run: npm run lint

  typecheck:
    name: TypeScript
    needs: install
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - uses: actions/cache/restore@v4
        with:
          path: node_modules
          key: nm-${{ hashFiles('package-lock.json') }}
      - run: npx tsc --noEmit
        continue-on-error: true  # Track but don't block until TS coverage grows

  test:
    name: Test
    needs: install
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - uses: actions/cache/restore@v4
        with:
          path: node_modules
          key: nm-${{ hashFiles('package-lock.json') }}
      # Benchmark guards (Task 4.3.3) use statistical p95 assertions,
      # so they are CI-safe. Old flaky benchmarks are still excluded.
      - run: npx vitest run --coverage --exclude='**/benchmarks/h1_benchmarks.test.js' --exclude='**/benchmarks/chartBenchmarks.test.js'
      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 14

  perf:
    name: Performance Benchmarks
    needs: install
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - uses: actions/cache/restore@v4
        with:
          path: node_modules
          key: nm-${{ hashFiles('package-lock.json') }}
      - name: Run FrameBudget benchmark
        run: npx vitest run src/__tests__/benchmarks/frameBudget.test.js
      - name: Run Benchmark Guards (10% threshold)
        run: npx vitest run src/__tests__/benchmarks/benchmarkGuards.test.js

  build:
    name: Build + Bundle Size
    needs: install
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - uses: actions/cache/restore@v4
        with:
          path: node_modules
          key: nm-${{ hashFiles('package-lock.json') }}
      - run: npm run build:client

      - name: Check bundle size
        run: |
          MAIN_CHUNK=$(find dist/client/assets -name 'index-*.js' -type f | head -1)
          if [ -z "$MAIN_CHUNK" ]; then
            echo "⚠️  No main chunk found — skipping size check"
            exit 0
          fi
          SIZE=$(gzip -c "$MAIN_CHUNK" | wc -c)
          SIZE_KB=$((SIZE / 1024))
          echo "📦 Main chunk: ${SIZE_KB}KB gzipped ($MAIN_CHUNK)"
          if [ "$SIZE" -gt 256000 ]; then
            echo "❌ Bundle too large! ${SIZE_KB}KB > 250KB"
            exit 1
          fi
          echo "✅ Bundle size OK"

      - name: Upload source maps to Sentry
        if: github.ref == 'refs/heads/main'
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
        run: |
          if [ -n "$SENTRY_AUTH_TOKEN" ]; then
            npx @sentry/cli sourcemaps upload --release=${{ github.sha }} dist/client/assets/
          else
            echo "⚠️  SENTRY_AUTH_TOKEN not set — skipping source map upload"
          fi

  audit:
    name: Security Audit
    needs: install
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - uses: actions/cache/restore@v4
        with:
          path: node_modules
          key: nm-${{ hashFiles('package-lock.json') }}
      - run: npm audit --audit-level=high --production
        continue-on-error: true  # Track but don't block on advisory lag

  sbom:
    name: SBOM
    needs: install
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - uses: actions/cache/restore@v4
        with:
          path: node_modules
          key: nm-${{ hashFiles('package-lock.json') }}
      - run: npx @cyclonedx/cyclonedx-npm --output-file sbom.json
      - uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: sbom.json
          retention-days: 90

  accessibility:
    name: Accessibility (axe-core)
    needs: install
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - uses: actions/cache/restore@v4
        with:
          path: node_modules
          key: nm-${{ hashFiles('package-lock.json') }}
      - run: npx playwright install --with-deps chromium
      - run: npm run build:client
      - name: Run axe-core accessibility audit
        run: npx playwright test e2e/accessibility.spec.ts

  frame-time:
    name: Frame Time Regression
    needs: install
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - uses: actions/cache/restore@v4
        with:
          path: node_modules
          key: nm-${{ hashFiles('package-lock.json') }}
      - run: npx playwright install --with-deps chromium
      - run: npm run build:client
      - name: Run frame time regression tests
        run: npx playwright test e2e/frame-time-regression.spec.ts

  web-vitals:
    name: Web Vitals Gate
    needs: install
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - uses: actions/cache/restore@v4
        with:
          path: node_modules
          key: nm-${{ hashFiles('package-lock.json') }}
      - run: npx playwright install --with-deps chromium
      - run: npm run build:client
      - name: Run Web Vitals performance budget
        run: npx playwright test e2e/performance-budget.spec.ts
