    default-src 'self';

      https://api.coincap.io wss://ws.coincap.io
      https://api.llama.fi https://coins.llama.fi
      https://paper-api.alpaca.markets https://data.alpaca.markets
      wss://stream.data.alpaca.markets
      https://api.groq.com https://generativelanguage.googleapis.com
      https://huggingface.co https://*.huggingface.co
      https://*.supabase.co wss://*.supabase.co
      https://*.sentry.io
      wss://ws.kraken.com
      ws://localhost:* http://localhost:*;

    style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;
    font-src 'self' https://fonts.gstatic.com data:;
    img-src 'self' data: blob: https:;
    worker-src 'self' blob:;

  <meta name="color-scheme" content="dark light" />

  <!-- Critical CSS (extracted for CSP compliance — no unsafe-inline needed) -->
  <link rel="stylesheet" href="/critical.css" fetchpriority="high" />

  <!-- JSON-LD: WebApplication structured data for SEO -->
  <script type="application/ld+json">

        "name": "charEdge"
      }
    }
