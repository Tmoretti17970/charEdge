  <link rel="stylesheet" href="/critical.css" fetchpriority="high" />

  <script type="application/ld+json">

        "name": "charEdge"
      }
    }
    </script>
</head>

<body>
  <div id="root"><!--ssr-outlet--></div>
  <noscript>
    <div
      style="display:flex;align-items:center;justify-content:center;height:100vh;background:#09090b;color:#ececef;font-family:Inter,sans-serif;text-align:center;padding:2rem">
      <div>
        <h1 style="font-size:1.5rem;margin-bottom:0.5rem">charEdge</h1>
        <p style="color:#888">JavaScript is required to run this app. Please enable JavaScript or try a different
          browser.</p>
      </div>
    </div>
  </noscript>
  <script>
    // ─── Polyfill: requestIdleCallback (not available on some Safari/iOS versions) ───
    if (typeof window.requestIdleCallback !== 'function') {
      window.requestIdleCallback = function(cb) {
        var start = Date.now();
        return setTimeout(function() {
          cb({ didTimeout: false, timeRemaining: function() { return Math.max(0, 50 - (Date.now() - start)); } });
        }, 1);
      };
      window.cancelIdleCallback = function(id) { clearTimeout(id); };
    }
  </script>
  <script>
    // ─── Boot diagnostic — catches ALL failure modes including silent module load errors ───
    window.__CE_ERRORS = [];
    window.addEventListener('error', function (e) {
      window.__CE_ERRORS.push('ERROR: ' + (e.message || 'Unknown') + ' @ ' + (e.filename || '?') + ':' + (e.lineno || '?'));
    });
    window.addEventListener('unhandledrejection', function (e) {
      var msg = e.reason ? (e.reason.message || String(e.reason)) : 'Unknown rejection';
      window.__CE_ERRORS.push('REJECT: ' + msg);
    });
    // After 5s, if React hasn't mounted, show diagnostics
    setTimeout(function () {
      var root = document.getElementById('root');
      // Check if React actually rendered (it adds real DOM elements, not just comments)
      var hasReactContent = root && root.querySelector && root.querySelector('[data-reactroot], div, section, main, form, button');
      if (!hasReactContent) {
        var errors = window.__CE_ERRORS;
        var info = 'Browser: ' + navigator.userAgent + '\nErrors (' + errors.length + '):\n' + errors.join('\n');
        root.innerHTML = '<div style="padding:2rem;color:#ececef;font-family:sans-serif;text-align:center;max-width:500px;margin:auto;margin-top:10vh">' +
          '<h2 style="color:#f59e0b;margin-bottom:1rem;font-size:20px">charEdge failed to load</h2>' +
          '<p style="font-size:13px;color:#aaa;margin-bottom:1.5rem">This browser may not be supported. Try Chrome or Firefox.</p>' +
          '<pre style="font-size:10px;color:#ef4444;background:#1a1a2e;padding:12px;border-radius:8px;text-align:left;overflow:auto;max-height:300px;white-space:pre-wrap;word-break:break-all">' +
          info.replace(/</g, '&lt;') +
          '</pre>' +
          '<button onclick="location.reload()" style="margin-top:1rem;padding:10px 24px;border:none;border-radius:8px;background:#f59e0b;color:#fff;font-weight:700;cursor:pointer;font-size:14px">Reload</button>' +
          '</div>';
      }
    }, 5000);
  </script>
  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
