<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" fill="none">
  <defs>
    <linearGradient id="m-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a2744"/>
      <stop offset="50%" stop-color="#2196F3"/>
      <stop offset="100%" stop-color="#26A69A"/>
    </linearGradient>
    <linearGradient id="m-candle" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#26A69A"/>
      <stop offset="100%" stop-color="#1a8a7e"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect x="4" y="4" width="120" height="120" rx="24" fill="#08090a"/>
  <rect x="4" y="4" width="120" height="120" rx="24" fill="url(#m-grad)" opacity="0.12"/>
  <rect x="4" y="4" width="120" height="120" rx="24" stroke="rgba(255,255,255,0.08)" stroke-width="1" fill="none"/>

  <!-- Mini candles -->
  <rect x="24" y="68" width="10" height="20" rx="2" fill="#EF5350" opacity="0.85"/>
  <rect x="40" y="54" width="10" height="22" rx="2" fill="url(#m-candle)"/>
  <rect x="56" y="48" width="10" height="8" rx="2" fill="#EF5350" opacity="0.85"/>
  <rect x="72" y="32" width="12" height="28" rx="2" fill="url(#m-candle)"/>
  <rect x="90" y="26" width="10" height="18" rx="2" fill="url(#m-candle)" opacity="0.9"/>

  <!-- Edge line -->
  <line x1="18" y1="84" x2="106" y2="18" stroke="url(#m-grad)" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
</svg>
