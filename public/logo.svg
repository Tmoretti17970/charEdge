<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <!-- Brand gradient: Navy → Teal (Forge palette) -->
    <linearGradient id="edge-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a2744"/>
      <stop offset="50%" stop-color="#2196F3"/>
      <stop offset="100%" stop-color="#26A69A"/>
    </linearGradient>
    <linearGradient id="candle-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#26A69A"/>
      <stop offset="100%" stop-color="#1a8a7e"/>
    </linearGradient>
    <linearGradient id="wick-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="rgba(38,166,154,0.7)"/>
      <stop offset="100%" stop-color="rgba(38,166,154,0.3)"/>
    </linearGradient>
  </defs>

  <!-- Background: Rounded square (squircle-like) -->
  <rect x="16" y="16" width="480" height="480" rx="96" fill="#08090a"/>
  <rect x="16" y="16" width="480" height="480" rx="96" fill="url(#edge-grad)" opacity="0.12"/>
  <rect x="16" y="16" width="480" height="480" rx="96" stroke="rgba(255,255,255,0.08)" stroke-width="2" fill="none"/>

  <!-- Chart candles: stylized ascending pattern -->
  <!-- Candle 1 (bear, small) -->
  <rect x="88" y="280" width="36" height="72" rx="6" fill="#EF5350" opacity="0.85"/>
  <rect x="104" y="268" width="4" height="96" rx="2" fill="#EF5350" opacity="0.5"/>

  <!-- Candle 2 (bull, medium) -->
  <rect x="148" y="228" width="36" height="80" rx="6" fill="url(#candle-grad)"/>
  <rect x="164" y="208" width="4" height="112" rx="2" fill="url(#wick-grad)"/>

  <!-- Candle 3 (bear, doji) -->
  <rect x="208" y="204" width="36" height="24" rx="6" fill="#EF5350" opacity="0.85"/>
  <rect x="224" y="188" width="4" height="56" rx="2" fill="#EF5350" opacity="0.5"/>

  <!-- Candle 4 (bull, large — breakout) -->
  <rect x="268" y="140" width="44" height="100" rx="8" fill="url(#candle-grad)"/>
  <rect x="288" y="116" width="4" height="136" rx="2" fill="url(#wick-grad)"/>

  <!-- Candle 5 (bull, continuation) -->
  <rect x="336" y="108" width="36" height="72" rx="6" fill="url(#candle-grad)" opacity="0.9"/>
  <rect x="352" y="92" width="4" height="100" rx="2" fill="url(#wick-grad)"/>

  <!-- Edge line: the "edge" — a sharp ascending trendline -->
  <line x1="72" y1="340" x2="400" y2="80" stroke="url(#edge-grad)" stroke-width="3" stroke-linecap="round" opacity="0.6"/>

  <!-- "CE" letterform hint (subtle) -->
  <text x="256" y="440" text-anchor="middle" font-family="Inter, -apple-system, sans-serif" font-size="48" font-weight="700" fill="rgba(255,255,255,0.12)" letter-spacing="0.08em">charEdge</text>
</svg>
