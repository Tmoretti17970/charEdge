# ═══════════════════════════════════════════════════════════════════
# TradeForge — Nginx Reverse Proxy Configuration
#
# Handles:
#   - SSL termination (via Cloudflare or Let's Encrypt)
#   - WebSocket upgrade for real-time data
#   - Static asset caching
#   - Gzip compression
#   - Rate limiting for API endpoints
#   - Security headers
# ═══════════════════════════════════════════════════════════════════

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 2048;
    use epoll;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # ─── Logging ─────────────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" '
                    '$request_time';
    access_log /var/log/nginx/access.log main;

    # ─── Performance ─────────────────────────────────────────
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    # ─── Gzip Compression ────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 5;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        image/svg+xml
        application/xml;

    # ─── Rate Limiting ───────────────────────────────────────
    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;
    limit_req_zone $binary_remote_addr zone=ws:10m rate=5r/s;

    # ─── Upstream ────────────────────────────────────────────
    upstream tradeforge {
        server tradeforge:3000;
        keepalive 64;
    }

    # ─── HTTP → HTTPS Redirect ───────────────────────────────
    server {
        listen 80;
        server_name tradeforge.app www.tradeforge.app;
        return 301 https://$server_name$request_uri;
    }

    # ─── Main HTTPS Server ───────────────────────────────────
    server {
        listen 443 ssl http2;
        server_name tradeforge.app www.tradeforge.app;

        # SSL (Cloudflare origin certificate or Let's Encrypt)
        ssl_certificate /etc/nginx/ssl/cert.pem;
        ssl_certificate_key /etc/nginx/ssl/key.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;

        # ─── Security Headers ────────────────────────────────
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

        # ─── Static Assets (cached aggressively) ─────────────
        location /assets/ {
            proxy_pass http://tradeforge;
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        # ─── WebSocket Endpoints ─────────────────────────────
        location /ws/ {
            limit_req zone=ws burst=10 nodelay;
            proxy_pass http://tradeforge;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 86400;
            proxy_send_timeout 86400;
        }

        # ─── API Endpoints ───────────────────────────────────
        location /api/ {
            limit_req zone=api burst=50 nodelay;
            proxy_pass http://tradeforge;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 5;
            proxy_read_timeout 30;
        }

        # ─── Default (SPA) ───────────────────────────────────
        location / {
            proxy_pass http://tradeforge;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
